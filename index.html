<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCOS - AgenQ Independent Core</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/index.css">
    <script>
        // Suppress benign platform and Vite HMR errors
        window.addEventListener('unhandledrejection', function(event) {
            if (event.reason && (
                (event.reason.message && (event.reason.message.includes('WebSocket') || event.reason.message.includes('vite'))) || 
                (typeof event.reason === 'string' && event.reason.includes('WebSocket'))
            )) {
                event.preventDefault();
            }
        });
        
        // Also suppress console errors that match known benign patterns
        const originalError = console.error;
        console.error = function(...args) {
            const msg = args.join(' ');
            if (
                msg.includes('[vite] failed to connect to websocket') ||
                msg.includes('Origin trial controlled feature not enabled') ||
                msg.includes('NG0953') ||
                msg.includes('No ID or name found in config')
            ) {
                return;
            }
            originalError.apply(console, args);
        };
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
